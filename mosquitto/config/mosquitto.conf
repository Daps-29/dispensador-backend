persistence true
persistence_location /mosquitto/data/

log_dest stdout
log_type error
log_type warning
log_type notice
log_type information

# Auth global — aplica a todos los listeners
allow_anonymous false
password_file /mosquitto/auth/passwd

listener 1883
protocol mqtt

listener 9001
protocol websockets

max_inflight_messages 20
max_queued_messages 100
